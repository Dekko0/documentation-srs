<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação SRS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Contentor que mantém a proporção 16:9 */
        #slide-viewport {
            position: relative;
            width: 1280px;
            height: 720px;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        iframe {
            width: 1280px;
            height: 720px;
            border: none;
            overflow: hidden;
        }

        /* Botões Laterais */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(46, 134, 193, 0.7);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            font-size: 24px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover { background: #2E86C1; transform: translateY(-50%) scale(1.1); }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        /* Indicador de página */
        #page-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <button class="nav-btn prev-btn" onclick="prevSlide()"><i class="fas fa-chevron-left"></i></button>
    
    <div id="slide-viewport">
        <iframe id="slide-frame" src="page01.html"></iframe>
    </div>

    <button class="nav-btn next-btn" onclick="nextSlide()"><i class="fas fa-chevron-right"></i></button>
    
    <div id="page-info">Slide: <span id="current">1</span> / 15</div>

    <script>
        let current = 1;
        const totalSlides = 15;
        const frame = document.getElementById('slide-frame');
        const viewport = document.getElementById('slide-viewport');
        const currentLabel = document.getElementById('current');

        function updateSlide() {
            // Formata o número com zero à esquerda (ex: page01, page02)
            const pageNum = current.toString().padStart(2, '0');
            frame.src = `page${pageNum}.html`;
            currentLabel.innerText = current;
        }

        function nextSlide() {
            if (current < totalSlides) { current++; updateSlide(); }
        }

        function prevSlide() {
            if (current > 1) { current--; updateSlide(); }
        }

        // Navegação por Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === " ") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });

        // Lógica de Redimensionamento (Responsividade)
        function resize() {
            const scale = Math.min(
                window.innerWidth / 1350, // Margem para os botões
                window.innerHeight / 750
            );
            viewport.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', resize);
        window.onload = resize;
    </script>
</body>
</html>
